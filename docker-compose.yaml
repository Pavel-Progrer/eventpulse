# docker-compose.yml
#
# Philosophy for this dev file:
#   - Everything is transparent: logs go to stdout, errors go to browser
#   - No security hardening — localhost only, all ports exposed for tooling
#   - Hot reload: source is bind-mounted, OPcache revalidates every request
#   - Xdebug ready: just set a breakpoint in your IDE and go
#   - Named volumes for Composer cache so installs stay fast between rebuilds

services:

  # ── NGINX ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine        # alpine = small image, fast pull
    container_name: myapp_nginx
    ports:
      - "8080:80"                   # http://localhost:8080 in browser
      - "8443:443"                  # optional self-signed HTTPS (see conf)
    volumes:
      # Shared source mount: same path as PHP-FPM so SCRIPT_FILENAME matches
      - ./src:/var/www/html:ro      # ro = Nginx only reads files, never writes
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Persist Nginx logs between restarts for analysis
      - nginx_logs:/var/log/nginx
    depends_on:
      - php-fpm
    networks:
      - eventpulse-net
    # Restart on config errors during dev so you don't wonder why it's dead
    restart: unless-stopped

  # ── PHP-FPM ────────────────────────────────────────────────────────────────
  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: myapp_phpfpm
    ports:
      # Expose 9000 to host so external tools (e.g. cgi-fcgi) can hit FPM directly
      # In production this would NEVER be exposed — dev only
      - "9000:9000"
    volumes:
      # rw: PHP needs to write sessions, upload_tmp, opcache file cache
      - ./src:/var/www/html:rw
      # Config files — edit on host, takes effect on container restart
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
      - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      # Named volume: keeps Composer's cache between image rebuilds
      - composer_cache:/root/.composer/cache
    environment:
      # Available in PHP via $_ENV or getenv() — no .env parsing needed in dev
      APP_ENV:   development
      APP_DEBUG: "true"
      # Xdebug needs to reach back to your machine — host.docker.internal
      # resolves to the host on Docker Desktop (Mac/Win) and most Linux setups
      XDEBUG_CONFIG: "client_host=host.docker.internal"
      PHP_IDE_CONFIG: "serverName=myapp"    # must match IDE server name setting
    networks:
      - eventpulse-net
    restart: unless-stopped

  # ── MAILPIT (local SMTP catcher) ───────────────────────────────────────────
  # Catches all outgoing mail — nothing actually sends. Web UI at :8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: myapp_mail
    ports:
      - "8025:8025"                 # web UI
      - "1025:1025"                 # SMTP — point PHP's SMTP here
    networks:
      - eventpulse-net

# ── NAMED VOLUMES ─────────────────────────────────────────────────────────────
volumes:
  composer_cache:   # survives `docker compose down`, lost on `down -v`
  nginx_logs:

# ── NETWORK ───────────────────────────────────────────────────────────────────
networks:
  eventpulse-net:
    driver: bridge