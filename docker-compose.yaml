# docker-compose.yml
#
# Philosophy for this dev file:
#   - Everything is transparent: logs go to stdout, errors go to browser
#   - No security hardening — localhost only, all ports exposed for tooling
#   - Hot reload: source is bind-mounted, OPcache revalidates every request
#   - Xdebug ready: just set a breakpoint in your IDE and go
#   - Named volumes for Composer cache so installs stay fast between rebuilds
#
# Services overview:
#   nginx      → serves HTTP, proxies to php-fpm
#   php-fpm    → Laravel application process
#   worker     → Laravel queue worker (same image as php-fpm, different command)
#   postgres   → primary database
#   redis      → queue backend + cache
#   mailpit    → local SMTP catcher, web UI at :8025

services:

  # ── NGINX ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: eventpulse_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - php-fpm
    networks:
      - eventpulse-net
    restart: unless-stopped

  # ── PHP-FPM ────────────────────────────────────────────────────────────────
  php-fpm:
    build:
      # Build context is the project root so the Dockerfile can reach
      # docker/php/* config files if needed. The Dockerfile itself lives
      # in docker/php/.
      context: .
      dockerfile: docker/php/Dockerfile
    image: eventpulse_php:dev         # name the built image so worker can reuse it
    container_name: eventpulse_phpfpm
    ports:
      - "9000:9000"
    volumes:
      - ./src:/var/www/html:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
      - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - composer_cache:/home/www-data/.composer/cache
    environment:
      APP_ENV:   development
      APP_DEBUG: "true"
      XDEBUG_CONFIG: "client_host=host.docker.internal"
      PHP_IDE_CONFIG: "serverName=eventpulse"
    depends_on:
      - postgres
      - redis
    networks:
      - eventpulse-net
    restart: unless-stopped

  # ── QUEUE WORKER ───────────────────────────────────────────────────────────
  # Reuses the same image as php-fpm — no separate build, no separate Dockerfile.
  # The only difference is the command: queue:work instead of php-fpm.
  #
  # Key point: `image: eventpulse_php:dev` refers to the image built by the
  # php-fpm service above. `depends_on: php-fpm` ensures php-fpm builds first.
  # No `build:` block here — that is what caused the original error.
  worker:
    image: eventpulse_php:dev
    container_name: eventpulse_worker
    volumes:
      - ./src:/var/www/html:rw
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer_cache:/home/www-data/.composer/cache
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "redis",
              "--tries=3", "--timeout=60", "--sleep=3"]
    environment:
      APP_ENV: development
    depends_on:
      - php-fpm          # ensures the image is built before worker tries to use it
      - redis
      - postgres
    networks:
      - eventpulse-net
    restart: unless-stopped

  # ── POSTGRESQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eventpulse_postgres
    ports:
      - "5432:5432"                   # expose to host for GUI tools (TablePlus etc.)
    environment:
      POSTGRES_DB:       eventpulse
      POSTGRES_USER:     eventpulse
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventpulse-net
    restart: unless-stopped

  # ── REDIS ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eventpulse_redis
    ports:
      - "6379:6379"                   # expose to host for redis-cli / RedisInsight
    volumes:
      - redis_data:/data
    networks:
      - eventpulse-net
    restart: unless-stopped

  # ── MAILPIT ────────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: eventpulse_mail
    ports:
      - "8025:8025"                   # web UI
      - "1025:1025"                   # SMTP — point Laravel's MAIL_HOST here
    networks:
      - eventpulse-net

# ── NAMED VOLUMES ──────────────────────────────────────────────────────────────
volumes:
  composer_cache:
  nginx_logs:
  postgres_data:
  redis_data:

# ── NETWORK ────────────────────────────────────────────────────────────────────
networks:
  eventpulse-net:
    driver: bridge