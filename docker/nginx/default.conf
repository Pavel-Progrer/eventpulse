# docker/nginx/default.conf
# Dev nginx config — verbose logging, no caching, FPM status exposed

upstream php_fpm {
    server php-fpm:9000;   # service name from docker-compose resolves via dev-net
    # No keepalive here — simpler for dev, each request gets a fresh connection
}

server {
    listen 80;
    server_name localhost;

    root  /var/www/html/public;
    index index.php index.html;

    # ── LOGGING — maximum verbosity ───────────────────────────────────────────
    # NOTE: 'log_format' must be defined in the http{} block in nginx.conf, not here.
    # Add this to nginx.conf → http {} block:
    #
    #   log_format dev '$remote_addr - $remote_user [$time_local] '
    #                  '"$request" $status $body_bytes_sent '
    #                  '"$http_referer" "$http_user_agent" '
    #                  'rt=$request_time ut=$upstream_response_time';
    #
    # If you cannot edit nginx.conf, replace 'dev' below with 'combined'.
    access_log /dev/stdout combined;   # stdout → docker compose logs
    error_log  /dev/stderr debug; # debug level — logs everything Nginx does

    # ── NO CACHING — see every change immediately ─────────────────────────────
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma        "no-cache";
    expires -1;

    # ── FPM STATUS — open to all in dev ───────────────────────────────────────
    # curl http://localhost:8080/fpm-status?full
    # curl http://localhost:8080/fpm-ping
    location ~ ^/(fpm-status|fpm-ping)$ {
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        access_log off;
    }

    # ── STATIC FILES ──────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|svg|map)$ {
        try_files $uri =404;
        # source maps (.map) served for JS debugging in browser devtools
        add_header Access-Control-Allow-Origin *;
    }

    # ── MAIN ROUTER ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP HANDLER ───────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass php_fpm;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        # No buffering in dev — see output immediately, streaming works
        fastcgi_buffering     off;

        # Long timeouts for debug sessions (Xdebug pauses execution)
        fastcgi_read_timeout  300s;   # must be >= max_execution_time
        fastcgi_send_timeout  300s;

        # Show PHP version header in dev — helps verify which PHP is running
        # fastcgi_hide_header X-Powered-By;  ← commented out intentionally
    }
}