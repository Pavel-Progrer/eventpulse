; docker/php/xdebug.ini
; Xdebug 3 configuration — modes control what features are active

[xdebug]

; ── MODE ──────────────────────────────────────────────────────────────────────
; debug   = step debugger (breakpoints in IDE)
; develop = enhanced var_dump output, better error pages
; profile = generate cachegrind files for performance profiling
; coverage = code coverage for PHPUnit
;
; Enable all at once for a complete dev toolkit.
; In prod this entire file doesn't exist.
xdebug.mode = debug,develop

; ── STEP DEBUGGER ─────────────────────────────────────────────────────────────
; Xdebug connects OUT to your IDE (not the other way around)
; host.docker.internal resolves to host machine from inside Docker Desktop
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003         ; IDE listens here (VS Code, PhpStorm default)

; Start a debug session automatically on every request
; Alternative: XDEBUG_SESSION=1 cookie or ?XDEBUG_SESSION_START in URL
xdebug.start_with_request = yes

; ── PROFILER ──────────────────────────────────────────────────────────────────
; Generates cachegrind files readable by QCacheGrind / WebGrind
; Activate per-request with ?XDEBUG_PROFILE=1 in URL so it doesn't run always
xdebug.profiler_enable_trigger  = 1
xdebug.profiler_output_dir      = /tmp/xdebug-profiles
xdebug.profiler_output_name     = cachegrind.out.%p.%r

; ── TRACING ───────────────────────────────────────────────────────────────────
; Function call traces — activate with ?XDEBUG_TRACE=1
xdebug.trace_enable_trigger     = 1
xdebug.trace_output_dir         = /tmp/xdebug-traces
xdebug.trace_output_name        = trace.%p.%r

; ── STACK TRACES ──────────────────────────────────────────────────────────────
xdebug.show_local_vars          = 1   ; show all local variables on error
xdebug.show_exception_trace     = 1   ; trace all exceptions, even caught ones
xdebug.show_error_trace         = 1
xdebug.file_link_format         = vscode://file/%f:%l    ; clickable file links
; PhpStorm: xdebug.file_link_format = phpstorm://open?file=%f&line=%l

; ── LIMITS ────────────────────────────────────────────────────────────────────
xdebug.var_display_max_depth    = 10   ; deep object graph inspection
xdebug.var_display_max_data     = 4096
xdebug.var_display_max_children = 256

; ── LOGGING — useful when debugger isn't connecting ──────────────────────────
; Comment out once Xdebug is working — it's verbose
xdebug.log                      = /tmp/xdebug.log
xdebug.log_level                = 7    ; 0=off, 7=all (set to 3 once working)