; docker/php/php.ini
; Dev philosophy: show everything, hide nothing, log everywhere

; ── ERRORS — display all errors directly in browser ───────────────────────────
display_errors         = On       ; show errors in HTTP response
display_startup_errors = On       ; show errors that occur during PHP startup
error_reporting        = E_ALL    ; every error, warning, notice, deprecation
log_errors             = On       ; also write to FPM error log (docker logs)
html_errors            = On       ; wrap errors in <pre> for readability

; ── OPCACHE — detect file changes on every single request ─────────────────────
; This is the opposite of production. Every save is reflected immediately.
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 10000
opcache.validate_timestamps    = 1    ; check file mtime on every request
opcache.revalidate_freq        = 0    ; 0 = check on EVERY request, no grace period
opcache.save_comments          = 1    ; keep docblocks (needed by Doctrine, PHPUnit)
; JIT off in dev — stack traces are cleaner and compile errors are clearer
opcache.jit                    = disable
opcache.jit_buffer_size        = 0

; ── EXECUTION LIMITS — generous for long debug sessions ───────────────────────
max_execution_time  = 300         ; 5 minutes — enough for any debug session
max_input_time      = 300
memory_limit        = 512M        ; generous — no memory_limit surprises in dev

; ── FILE UPLOADS — permissive for local testing ───────────────────────────────
upload_max_filesize = 64M
post_max_size       = 64M
file_uploads        = On

; ── MAIL — point to Mailpit SMTP catcher ──────────────────────────────────────
SMTP      = mailpit           ; docker service name resolves via dev-net
smtp_port = 1025
sendmail_path = /usr/sbin/sendmail -S mailpit:1025

; ── SESSIONS — file-based for simplicity ──────────────────────────────────────
session.save_handler  = files
session.save_path     = /tmp/sessions
session.gc_maxlifetime = 86400    ; sessions last a full day in dev

; ── MISC DEV HELPERS ──────────────────────────────────────────────────────────
; Show all variable types in var_dump output
xdebug.var_display_max_depth   = 10
xdebug.var_display_max_data    = 2048

; Longer CLI timeout for scripts and Artisan commands
default_socket_timeout = 120

; UTF-8 everywhere
default_charset        = UTF-8

; Expose PHP version header — fine in dev, never in prod
expose_php = On