; docker/php/php-fpm.conf
; Replaces the default www.conf pool
; Dev philosophy: small pool (you're the only user), maximum logging

[www]

; ── PROCESS IDENTITY ──────────────────────────────────────────────────────────
; www-data matches the Dockerfile USER — no permission mismatches on bind mount
user  = www-data
group = www-data

; ── SOCKET — TCP for dev so external tools can reach it ───────────────────────
; In prod this would be a Unix socket. TCP is fine here since it's localhost.
listen = 0.0.0.0:9000

; ── PROCESS MANAGER ───────────────────────────────────────────────────────────
; ondemand: workers start only when a request arrives
; Perfect for dev — saves RAM, and the startup time is irrelevant locally
pm                      = dynamic
pm.max_children         = 5       ; you only need a handful locally
pm.start_servers        = 2
pm.min_spare_servers    = 1
pm.max_spare_servers    = 3
pm.max_requests         = 0       ; never recycle workers — keep memory state for debugging
pm.process_idle_timeout = 600s    ; keep workers alive for 10 min between requests

; ── STATUS AND PING ───────────────────────────────────────────────────────────
; In dev we expose these without any access restriction
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; ── SLOW LOG ──────────────────────────────────────────────────────────────────
; Low threshold so we see any sluggishness immediately in dev
slowlog                      = /proc/self/fd/2   ; stderr → docker logs
request_slowlog_timeout      = 1s
request_slowlog_trace_depth  = 30                ; deep stack traces
request_terminate_timeout    = 300s              ; matches max_execution_time

; ── LOGGING ───────────────────────────────────────────────────────────────────
; Send everything to stderr so `docker compose logs -f` shows it all
php_admin_value[error_log]      = /proc/self/fd/2
php_flag[display_errors]        = on
php_flag[log_errors]            = on
php_admin_value[error_reporting] = E_ALL

; ── ENVIRONMENT PASSTHROUGH ───────────────────────────────────────────────────
; Makes docker-compose environment: vars available inside PHP
clear_env                = no    ; pass ALL host env vars into workers
env[APP_ENV]             = $APP_ENV
env[APP_DEBUG]           = $APP_DEBUG

; ── OPEN BASEDIR — disabled in dev for convenience ────────────────────────────
; In prod: php_admin_value[open_basedir] = /var/www/html:/tmp
; In dev: leave unset so you can require/include paths freely during debugging